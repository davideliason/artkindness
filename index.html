<html lang="en">

  <link rel="stylesheet" href="styles.css" />
</head>


<body>
  <nav class="navbar">
  <div class="logo">Art Kindness</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="art.html">Art</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

  <main class="wrapper">
    <div class="card">

      <h1>
        <span class="emoji">😊</span> Art Kindness
      </h1>

      <p class="lead">
        Art has the potential to inspire and provoke.
      </p>

      <p class="lead">
        It also can provide functionality beneath the aesthetics
      </p>

      <div class="divider"></div>

      <p class="footer-text">
        Here we explore both. Welcome to the journey!
      </p>
    </div>
  </main>

  <footer>
   <p> Created by 
    <a href="https://www.davethemaker.com" target="_blank" rel="noopener noreferrer">
      DaveTheMaker
    </a>
   </p> 
  </footer>

  <button id="lambdaButton">Run Lambda</button>

<p id="result"></p>

<script>
  const apiUrl = "https://v30mud3lc9.execute-api.us-west-2.amazonaws.com/hello";

  document.getElementById("lambdaButton").addEventListener("click", async () => {
    try {
      const response = await fetch(apiUrl);
      const data = await response.json();

      document.getElementById("result").textContent =
        data.message || JSON.stringify(data);

    } catch (error) {
      document.getElementById("result").textContent =
        "Error calling Lambda";
      console.error(error);
    }
  });
</script>
</body>
