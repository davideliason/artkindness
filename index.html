<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Art Kindness</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <nav class="navbar">
  <div class="logo">Art Kindness</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="art.html">Art</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

  <main class="wrapper">
    <div class="card">

      <h1>
        <span class="emoji">😊</span> Art Kindness
      </h1>

      <p class="lead">
        Art has the potential to inspire and provoke.
      </p>

      <p class="lead">
        It also can provide functionality beneath the aesthetics
      </p>

      <div class="divider"></div>

      <p class="footer-text">
        Here we explore both. Welcome to the journey!
      </p>

    </div>
    <div>
      <button id="loadImageBtn">Show Image</button>

<br><br>

<img id="myImage" src="" alt="Art Kindness logo" style="max-width: 400px; display: none;" />
       </div>
  </main>

  <footer class="footer">
    created by 
    <a href="https://www.davethemaker.com" target="_blank" rel="noopener noreferrer">
      DaveTheMaker
    </a>
  </footer>

</body>
<script>
  const apiUrl = "https://p4vthfxr0g.execute-api.us-west-2.amazonaws.com/get-image";

  document.getElementById("loadImageBtn").addEventListener("click", async () => {
    const response = await fetch(apiUrl);
    const data = await response.json();

    const img = document.getElementById("myImage");
    img.src = data.imageUrl;
    img.style.display = "block";
  });
</script>
</html>
